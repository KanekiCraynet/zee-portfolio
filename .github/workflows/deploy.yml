name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build for Cloudflare
        run: pnpm cf:build
        env:
          # NOTE: RESEND_API_KEY is intentionally NOT passed here.
          # It is a runtime-only secret, bound to the Worker via
          # `wrangler secret put` below. Passing it at build time would
          # widen exposure (build logs / bundle) with no benefit.
          CONTACT_EMAIL: ${{ secrets.CONTACT_EMAIL }}
          NEXT_PUBLIC_GITHUB_OWNER: KanekiCraynet
          NEXT_PUBLIC_GITHUB_REPO: zee-portfolio
          # NEXT_PUBLIC_SENTRY_DSN is inlined into the client bundle. A Sentry
          # DSN is designed to be public, so this is acceptable.
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

      - name: Deploy to Cloudflare Workers
        run: pnpm wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Bind RESEND_API_KEY as Worker secret
        run: echo "$RESEND_API_KEY" | npx wrangler secret put RESEND_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}

